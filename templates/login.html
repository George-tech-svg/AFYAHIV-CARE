<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFYAHIV CARE | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0D5C2E 0%, #064E3B 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { display: flex; max-width: 900px; width: 90%; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .info-panel { background: linear-gradient(135deg, #0D5C2E 0%, #064E3B 100%); color: white; padding: 40px; flex: 1; }
        .info-panel h1 { font-size: 32px; margin-bottom: 20px; }
        .login-panel { padding: 40px; flex: 1; }
        .login-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 12px 20px; cursor: pointer; border: none; background: none; font-size: 16px; font-weight: 500; text-align: center; transition: all 0.3s; }
        .tab.patient-tab { background: #0D5C2E; color: white; border-radius: 8px 8px 0 0; }
        .tab.doctor-tab { background: #f0f0f0; color: #666; border-radius: 8px 8px 0 0; }
        .tab.patient-tab.active { background: #0D5C2E; color: white; }
        .tab.doctor-tab.active { background: #0D5C2E; color: white; }
        .login-form { display: none; }
        .login-form.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #0D5C2E; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #064E3B; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .info-text { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; font-size: 12px; text-align: center; color: #666; }
        .security-badge { display: inline-block; background: #0D5C2E; color: white; padding: 5px 10px; border-radius: 20px; font-size: 10px; margin-top: 10px; }
        @media (max-width: 768px) { .container { flex-direction: column; } .info-panel { padding: 20px; } .info-panel h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-panel">
            <h1>AFYAHIV CARE</h1>
            <div class="security-badge">CONFIDENTIAL - Patient Identity Protected</div>
        </div>
        
        <div class="login-panel">
            <div class="login-tabs">
                <button class="tab patient-tab active" onclick="showTab('patient')">PATIENT LOGIN</button>
                <button class="tab doctor-tab" onclick="showTab('doctor')">DOCTOR LOGIN</button>
            </div>
            
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="/patient/login" class="login-form active" id="patientForm">
                <div class="form-group">
                    <label>PHONE NUMBER</label>
                    <input type="tel" name="phone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label>PATIENT ID</label>
                    <input type="text" name="patient_id" placeholder="Enter your Patient ID (e.g., HIV001)" required>
                </div>
                <button type="submit">ACCESS PATIENT DASHBOARD</button>
            </form>
            
            <form method="POST" action="/doctor/login" class="login-form" id="doctorForm">
                <div class="form-group">
                    <label>USERNAME</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">ACCESS DOCTOR DASHBOARD</button>
            </form>
            
            <div class="info-text">
                <strong>How to get access:</strong><br>
                Patients: Your doctor will provide you with a Patient ID and register your phone number.<br>
                Doctor: Contact system administrator for credentials.
            </div>
        </div>
    </div>
    
    <script>
        function showTab(type) {
            const tabs = document.querySelectorAll('.tab');
            const forms = document.querySelectorAll('.login-form');
            tabs.forEach(tab => tab.classList.remove('active'));
            forms.forEach(form => form.classList.remove('active'));
            if (type === 'patient') {
                tabs[0].classList.add('active');
                document.getElementById('patientForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('doctorForm').classList.add('active');
            }
        }
    </script>
</body>
</html>
